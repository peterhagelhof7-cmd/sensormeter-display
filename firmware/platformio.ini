; Sensormeter Display (HW-458B: ESP-WROOM-32 + ST7789P3 2,8" 240x320, resistiver Touch)

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Eigene Partitionstabelle statt PlatformIO-Default: OTA-Update (lokaler
; .bin-Upload ueber den Webserver) braucht zwei App-Slots (ota_0/ota_1)
; statt einer einzelnen App-Partition - siehe partitions_ota.csv und
; docs/entscheidungen.md.
board_build.partitions = partitions_ota.csv

; Touch (XPT2046-artiger Controller) wird bewusst per Bit-Bang auf den
; TP_-Pins angesteuert (siehe TouchManager.cpp), nicht ueber eine SPI-Bibliothek:
; die verfuegbaren XPT2046-Libraries nutzen intern den globalen SPI-Bus, der
; hier bereits vom TFT belegt ist - ein zweiter, unabhaengiger Hardware-SPI-Bus
; haette den Aufwand nicht gelohnt fuer ein einfaches Touch-Protokoll.
;
; Webserver (ESPAsyncWebServer/AsyncTCP): async statt synchron, damit HTTP-
; Anfragen den Hauptloop (Touch, Sensor-Polling, Ping, Snake) nicht
; blockieren - dieselben, im Sensormeter-Projekt bereits bewaehrten
; Bibliotheksversionen.
lib_deps =
	bodmer/TFT_eSPI @ ^2.5.43
	adafruit/DHT sensor library @ ^1.4.6
	adafruit/Adafruit Unified Sensor @ ^1.1.14
	marian-craciunescu/ESP32Ping @ ^1.7
	esp32async/ESPAsyncWebServer @ ^3.11.2
	esp32async/AsyncTCP @ ^3.4.10

build_flags =
	; --- TFT_eSPI Konfiguration ueber Build-Flags statt User_Setup.h ---
	-D USER_SETUP_LOADED=1
	-D ST7789_DRIVER=1
	-D TFT_RGB_ORDER=TFT_BGR
	-D TFT_WIDTH=240
	-D TFT_HEIGHT=320
	-D TFT_MOSI=13
	-D TFT_MISO=12
	-D TFT_SCLK=14
	-D TFT_CS=15
	-D TFT_DC=2
	-D TFT_RST=-1
	-D TFT_BL=21
	-D TFT_BACKLIGHT_ON=HIGH
	-D LOAD_GLCD=1
	-D LOAD_FONT2=1
	-D LOAD_FONT4=1
	-D LOAD_FONT6=1
	-D LOAD_FONT7=1
	-D LOAD_FONT8=1
	-D LOAD_GFXFF=1
	-D SMOOTH_FONT=1
	-D SPI_FREQUENCY=40000000
