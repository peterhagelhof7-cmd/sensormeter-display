zabbix_export:
  version: '6.4'
  template_groups:
    - uuid: 5974b75883344656b36c0057518af8fd
      name: 'IoT Sensoren'
  templates:
    - uuid: 8a1c9d3e6f4b4a2c9d0e7f5a3b2c1d4e
      template: 'Sensormeter Display HW-458B'
      name: 'Sensormeter Display (HW-458B)'
      description: |
        Template fuer das Sensormeter-Display-Projekt (HW-458B Touchdisplay).

        Anders als das Sensormeter-Projekt (WT32-ETH01) betreibt dieses
        Geraet KEINEN SNMP-Agenten und KEINEN Webserver - es ist ein reiner
        SNMP-/Ping-Client (siehe docs/lastenheft.txt Abschnitt 7.3/7.4) ohne
        eigene Netzwerk-Gegenstelle zum Abfragen. Die auf dem Display
        angezeigten Werte (DHT11, Sensormeter-SNMP, Ping-Ergebnisse) werden
        NICHT ueber das Netzwerk bereitgestellt.

        Dieses Template beschraenkt sich daher bewusst auf
        agentenlose ICMP-Erreichbarkeitsueberwachung (Zabbix-Simple-Checks,
        kein Zabbix-Agent noetig) - siehe docs/entscheidungen.md fuer die
        Begruendung. Sinnvoll, um zu erkennen, ob das Display selbst
        (und damit seine WLAN-Verbindung) ausgefallen ist.

        Vor dem Einsatz:
        1. Dieses Template importieren
        2. Neuen Host anlegen, dieses Template zuweisen
        3. Agent-Interface des Hosts auf die IP des Displays setzen (wird
           nur als Zieladresse fuer die ICMP-Simple-Checks benutzt, es
           muss kein Zabbix-Agent auf dem Display laufen)
      groups:
        - name: 'IoT Sensoren'
      macros:
        - macro: '{$ICMP_LOSS_MAX_PERCENT}'
          value: '20'
          description: 'Schwellwert fuer Warnung bei hohem ICMP-Paketverlust'
        - macro: '{$ICMP_RESPONSE_MAX_SEC}'
          value: '1'
          description: 'Schwellwert fuer Warnung bei hoher ICMP-Antwortzeit'
      items:
        - uuid: 2f5e8b1a4c3d4e6f9a0b1c2d3e4f5a6b
          name: 'Erreichbarkeit (ICMP)'
          type: SIMPLE
          key: 'icmpping'
          delay: 1m
          value_type: UNSIGNED
          description: '1 = erreichbar, 0 = nicht erreichbar'
          tags:
            - tag: component
              value: connectivity
        - uuid: 3a6f9c2b5d4e4f7a0b1c2d3e4f5a6b7c
          name: 'Antwortzeit (ICMP)'
          type: SIMPLE
          key: 'icmppingsec'
          delay: 1m
          value_type: FLOAT
          units: s
          tags:
            - tag: component
              value: connectivity
        - uuid: 4b7a0d3c6e5f4a8b1c2d3e4f5a6b7c8d
          name: 'Paketverlust (ICMP)'
          type: SIMPLE
          key: 'icmppingloss'
          delay: 1m
          value_type: FLOAT
          units: '%'
          tags:
            - tag: component
              value: connectivity
  triggers:
    - uuid: 5c8b1e4d7f6a4b9c2d3e4f5a6b7c8d9e
      name: '{HOST.NAME} nicht erreichbar (ICMP)'
      expression: 'last(/Sensormeter Display HW-458B/icmpping)=0'
      priority: HIGH
    - uuid: 6d9c2f5e8a7b4c0d3e4f5a6b7c8d9e0f
      name: 'Hoher Paketverlust zu {HOST.NAME}'
      expression: 'min(/Sensormeter Display HW-458B/icmppingloss,5m)>{$ICMP_LOSS_MAX_PERCENT}'
      priority: WARNING
    - uuid: 7e0d3a6f9b8c4d1e4f5a6b7c8d9e0f1a
      name: 'Hohe Antwortzeit von {HOST.NAME}'
      expression: 'min(/Sensormeter Display HW-458B/icmppingsec,5m)>{$ICMP_RESPONSE_MAX_SEC}'
      priority: WARNING
